<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCSA - Online Application Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;700&family=Poppins:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .portal-header-logo { display: block; height: 65px; width: 65px; margin: 0 auto 15px auto; border-radius: 50%; object-fit: contain; }
    </style>
</head>
<body>
  
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="assets/logo.jpg" alt="Datamex College of Saint Adeline Logo">
            <span>DATAMEX COLLEGE OF SAINT ADELINE</span>
        </a>
        <div class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="strands.html">Programs</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Admissions</a></li>
            <li><a href="login.html">SIS Portal</a></li>
            <li><a href="register.html">Enroll Online</a></li>
        </ul>
    </nav>

    <div class="form-view-wrapper">
        <div class="form-panel">
            <img src="assets/logo.jpg" alt="DCSA Shield" class="portal-header-logo">
            <h2>Admission Form</h2>
            <p class="panel-sub">Academic Year 2026-2027 Enrollment Registration</p>
            
            <form onsubmit="handleRegistrationSubmit(event)">
                <div class="form-group">
                    <label>Applicant Discord Username</label>
                    <div class="input-container">
                        <i class="fa-solid fa-user-graduate"></i>
                        <input type="text" placeholder="Juan Dela Cruz" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Discord ID</label>
                    <div class="input-container">
                        <i class="fa-solid fa-hashtag"></i>
                        <input type="text" maxlength="4" placeholder="1234" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Academic Track Program</label>
                    <div class="input-container">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <select required>
    <option value="" disabled selected>Select SHS Strand</option>
    
    <optgroup label="Academic Track">
        <option value="stem">STEM (Science & Tech)</option>
        <option value="abm">ABM (Business & Accountancy)</option>
        <option value="humss">HUMSS (Social Sciences)</option>
        <option value="gas">GAS (General Academic)</option>
    </optgroup>
    
    <optgroup label="Technical-Vocational-Livelihood (TVL) Track">
        <option value="he">HE (Home Economics)</option>
        <option value="ict">ICT (Information & Communications Tech)</option>
    </optgroup>
</select>

                    </div>
                </div>

                <div class="form-group">
                    <label>Create Password</label>
                    <div class="input-container">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" placeholder="Create a password for your portal access" required>
                    </div>
                </div>

                <button type="submit" class="form-action-btn">Submit Admission File</button>
            </form>

            <div class="panel-footer-links">
                Already registered? <a href="login.html">Login to SIS Portal</a>
                <br><br>
                <a href="index.html" style="color: var(--muted-gray);"><i class="fa-solid fa-arrow-left"></i> Home Page</a>
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
