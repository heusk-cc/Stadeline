<!DOCTYPE html>
<html>
<head>

<title>DCSA Admin Portal</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body style="background:#f1f5f9;font-family:system-ui;padding-bottom:40px">


<header style="
background:#0f172a;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:4px solid #8b1416">

<h2>DCSA ADMIN PORTAL</h2>

<button onclick="logoutAdmin()"
style="
background:#8b1416;
color:white;
border:0;
padding:10px 20px;
cursor:pointer">
LOGOUT
</button>

</header>



<div style="
max-width:1000px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px">


<h2>Student Management</h2>


<div style="display:flex;gap:10px">

<input id="searchStudentId"
placeholder="Search Student ID / Email / Username"
style="flex:1;padding:12px">


<button onclick="searchStudentProfile()"
style="
background:#0f172a;
color:white;
border:0;
padding:12px 20px">
SEARCH
</button>

</div>



<form id="adminEditForm"
style="display:none"
onsubmit="updateStudentProfile(event)">



<h3>Profile</h3>


<div class="grid">


<input id="adminStudentName"
placeholder="Username">


<input id="adminStudentEmail"
placeholder="Email">


<input id="adminStudentStudentId"
placeholder="Student ID">



<select id="adminStudentTrack">

<option value="">Keep Current Track</option>
<option value="stem">STEM</option>
<option value="humss">HUMSS</option>
<option value="abm">ABM</option>
<option value="ict">ICT</option>
<option value="tvl">TVL</option>

</select>



<select id="adminStudentStatus">

<option value="">Keep Status</option>

<option>
PENDING APPLICATION
</option>

<option>
APPROVED
</option>

<option>
OFFICIALLY ENROLLED
</option>

<option>
REJECTED / INCOMPLETE
</option>


</select>


<input id="adminRegistrationDate"
placeholder="Registration Date">


</div>



<hr>



<h3>Grades</h3>


<table width="100%" border="1">

<thead>

<tr>
<th>Subject</th>
<th>Grade</th>
</tr>

</thead>


<tbody id="gradesTable">


</tbody>


</table>



<hr>



<h3>Schedule</h3>


<table width="100%" border="1">

<thead>

<tr>
<th>Day</th>
<th>Schedule</th>
</tr>

</thead>


<tbody id="scheduleTable">


</tbody>


</table>



<br>


<button
style="
width:100%;
padding:15px;
background:#8b1416;
color:white;
border:0;
font-weight:bold">

SAVE CHANGES

</button>


</form>


</div>



<script>

function logoutAdmin(){

sessionStorage.removeItem("adminAuthenticated");

location.href="admin-login.html";

}


</script>


<script type="module" src="js/admin.js"></script>


</body>
</html>
