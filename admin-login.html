<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DCSA SIS - Administrative Portal Gate</title>
    <style>
        body { background: #0f172a; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        .brand-header { border-bottom: 3px solid #8b1416; padding-bottom: 15px; margin-bottom: 25px; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; font-size: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        button { background: #8b1416; color: white; width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
        button:hover { background: #a11b1e; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 class="brand-header">Admin Portal Access</h2>
        <form id="adminLoginForm" onsubmit="processAdminLogin(event)">
            <input type="text" id="adminUser" placeholder="Administrative Username" required>
            <input type="password" id="adminPass" placeholder="Security Access Key" required>
            <button type="submit">Verify Authority</button>
        </form>
    </div>

    <script src="js/admin-login.js"></script>
</body>
</html>
