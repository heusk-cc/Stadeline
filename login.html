<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCSA Academy - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;700&family=Poppins:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="form-view-wrapper" style="padding-top: 40px;">
        <div class="form-panel">
            <h2>Portal Log In</h2>
            <p class="panel-sub">Access your student tracking metrics</p>
            
            <form onsubmit="handleMockSubmit(event, 'Verification success. Initializing campus data streams...');">
                <div class="form-group">
                    <label>Discord Username</label>
                    <div class="input-container">
                        <i class="fa-brands fa-discord"></i>
                        <input type="text" placeholder="Your current handle" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Portal Key / Password</label>
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="form-action-btn">Verify Credentials</button>
            </form>

            <div class="panel-footer-links">
                Need an account? <a href="register.html">Apply for enrollment</a>
                <br><br>
                <a href="index.html" style="color: var(--muted-gray);"><i class="fa-solid fa-arrow-left"></i> Back to Main Terminal</a>
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
